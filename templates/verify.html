{% extends "base.html" %}
{% block title %}Verify OTP{% endblock %}

{% block content %}
<h2>Enter OTP</h2>
<form method="POST" action="/verify-otp">
    <input type="text" name="otp" placeholder="Enter OTP" required>
    <button type="submit">Verify</button>
</form>
<br>
<a href="/resend-otp">
    <button>Resend OTP</button>
</a>
{% endblock %}
